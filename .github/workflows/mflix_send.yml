name: Send Movie File (Original Name Fix)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'වීඩියෝ එකේ ID එක (GDrive හෝ VOE)'
        required: true
        default: '16WlbtOM4waRMqpDa34mQpyYFKdthqASf'
      user_jid:
        description: 'ඔයාගේ WhatsApp Number එක'
        required: true
        default: '94766886046@s.whatsapp.net'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests gdown
          npm install @whiskeysockets/baileys pino axios

      - name: Run Script
        env:
          VOE_KEY: ${{ secrets.VOE_KEY }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          FILE_ID: ${{ github.event.inputs.file_id }}
          USER_JID: ${{ github.event.inputs.user_jid }}
        run: |
          cat <<'EOF' > downloader.py
          import os, requests, sys, gdown, re

          file_id = os.getenv('FILE_ID')
          voe_key = os.getenv('VOE_KEY')

          def get_filename(response, url):
              cd = response.headers.get('content-disposition')
              if cd and 'filename=' in cd:
                  fname = re.findall('filename="?([^"]+)"?', cd)[0]
                  return fname
              return os.path.basename(url.split('?')[0]) or "video.mkv"

          try:
              if len(file_id) > 20: # GDrive Logic
                  url = f'https://drive.google.com/uc?id={file_id}'
                  # gdown ඔටෝමැටිකලි නියම නමෙන් ෆයිල් එක ඩවුන්ලෝඩ් කරයි
                  output = gdown.download(url, quiet=False, fuzzy=True)
              else: # VOE Logic
                  api_url = f"https://voe.sx/api/drive/v2/file/info?key={voe_key}&file_code={file_id}"
                  r = requests.get(api_url).json()
                  direct_url = r.get('result', {}).get('direct_url')
                  if direct_url:
                      res = requests.get(direct_url, stream=True)
                      output = get_filename(res, direct_url)
                      with open(output, 'wb') as f:
                          for chunk in res.iter_content(1024*1024): f.write(chunk)
                  else:
                      print("Error: VOE link not found")
                      sys.exit(1)

              # සේව් වුණු නම filename.txt එකට ලියනවා Node.js වලට ගන්න
              with open('filename.txt', 'w', encoding='utf-8') as f:
                  f.write(output)
              print(f"Download Finished! Filename: {output}")

          except Exception as e:
              print(f"Critical Error: {e}")
              sys.exit(1)
          EOF
          
          python3 downloader.py
          node send.js
